<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure DevOps AI Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="glow-sphere sphere-1"></div>
    <div class="glow-sphere sphere-2"></div>

    <div class="app-wrapper">
        <!-- Floating Header -->
        <header class="app-header">
            <div class="header-left">
                <div class="logo-badge">▲</div>
                <div class="header-titles">
                    <h1>Azure DevOps Agent</h1>
                    <div class="status-row">
                        <div class="status-indicator">
                            <span class="pulse-dot green"></span>
                            <span>Local MCP Server Connected</span>
                        </div>
                        <div class="status-indicator">
                            <span class="pulse-dot purple"></span>
                            <span>Gemini 3.1 Ready</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <button id="theme-toggle" class="theme-btn" aria-label="Toggle Theme">
                    <!-- Sun icon -->
                    <svg class="sun-icon" viewBox="0 0 24 24">
                        <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.01c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
                    </svg>
                    <!-- Moon icon -->
                    <svg class="moon-icon" viewBox="0 0 24 24">
                        <path d="M12.3 22h-.1c-5.4 0-9.7-4.3-9.7-9.7 0-4.7 3.4-8.7 8-9.4.5-.1 1 .3.9.8-.1.4-.4.8-.4 1.3 0 3.5 2.9 6.4 6.4 6.4.5 0 .9-.1 1.3-.4.5-.3 1.1.1.9.7-.7 4.7-4.7 8.3-9.4 8.3z"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Main Chat Area -->
        <main class="chat-container">
            <div class="chat-viewport" id="chat-viewport">
                <!-- Welcome Message -->
                <div class="message agent-message welcome-msg">
                    <div class="avatar">🤖</div>
                    <div class="message-body">
                        <h3>Hi, I am your Azure DevOps Assistant</h3>
                        <p>Ask me to query projects, create work items/bugs, link dependencies, or manage build pipelines on your workspace. What would you like to automate today?</p>
                    </div>
                </div>
            </div>

            <!-- Input area -->
            <footer class="input-panel">
                <form id="chat-form" onsubmit="sendMessage(event)">
                    <input type="text" id="prompt-input" autocomplete="off" placeholder="Message the agent..." required>
                    <button type="submit" id="send-btn" aria-label="Send message">
                        <svg class="send-icon" viewBox="0 0 24 24">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </form>
            </footer>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
